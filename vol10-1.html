<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathCore — 10.º Ano · Vol. 1</title>
    <script src="js/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="grade-page volume-page">
    <header class="topbar topbar--volume">
      <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Mostrar ou ocultar o painel lateral">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round" />
        </svg>
      </button>
      <div class="topbar__search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          id="search-topics"
          type="search"
          placeholder="Pesquisar tópicos…"
          autocomplete="off"
          aria-label="Pesquisar tópicos"
        />
      </div>
      <div class="topbar__actions">
        <a class="btn-back" href="ano10.html">← Voltar</a>
        <a class="btn-home" href="index.html">Início</a>
      </div>
    </header>

    <div class="grade-body volume-body">
      <aside class="sidebar" aria-label="Índice deste volume">
        <div class="sidebar__title"><span id="sidebar-vol-label">Vol.</span></div>
        <nav id="sidebar-tree" class="sidebar-tree"></nav>
      </aside>

      <div class="main-wrap">
        <div class="main-inner main-inner--volume">
          <div id="main-content"></div>
        </div>
      </div>
    </div>

    <div id="topic-modal-backdrop" class="modal-backdrop" aria-hidden="true"></div>
    <div
      id="topic-modal"
      class="modal modal--topic"
      role="dialog"
      aria-modal="true"
      aria-labelledby="topic-modal-title"
      aria-hidden="true"
    >
      <div class="modal__header">
        <h2 id="topic-modal-title"></h2>
        <button type="button" class="modal__close" data-close-modal aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="modal__image-wrap">
          <img id="topic-modal-img" class="is-hidden" alt="" width="800" height="600" />
          <p id="topic-modal-placeholder" class="modal__placeholder">Aqui será inserida a imagem do resumo</p>
        </div>
      </div>
    </div>

    <script src="js/vol-10-1.js"></script>
    <script src="js/global-search-index.js"></script>
    <script src="js/volume-page.js"></script>
    <script src="js/theme-ui.js" defer></script>
  </body>
</html>
